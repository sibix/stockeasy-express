<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — StockEasy</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/core.css" />

    <style>
      /* ===== DASHBOARD PAGE CSS (FROM MOCKUP) ===== */

      .metric-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
        gap:14px;
        margin-bottom:20px;
      }

      .metric-tile{
        background:#fff;
        border-radius:12px;
        padding:18px 20px;
        box-shadow:var(--shadow-sm);
        border:1px solid var(--slate-200);
        cursor:pointer;
        transition:all .2s;
        position:relative;
        overflow:hidden;
      }

      .metric-tile:hover{
        transform:translateY(-2px);
        box-shadow:var(--shadow-md);
        border-color:var(--green-300);
      }

      .metric-tile::before{
        content:'';
        position:absolute;
        top:0;left:0;right:0;
        height:3px;
        background:var(--green-500);
      }

      .metric-tile.blue::before{background:var(--color-info);}
      .metric-tile.amber::before{background:var(--color-warning);}
      .metric-tile.red::before{background:var(--color-danger);}
      .metric-tile.purple::before{background:var(--color-accent);}

      .metric-icon{
        font-size:32px;
        margin-bottom:10px;
      }

      .metric-val{
        font-size:30px;
        font-weight:800;
        color:var(--slate-800);
        font-family:var(--font-mono);
      }

      .metric-lbl{
        font-size:12px;
        color:var(--slate-500);
        font-weight:600;
        margin-top:2px;
      }

      .metric-trend{
        font-size:11px;
        font-weight:600;
        margin-top:6px;
      }

      .metric-trend.up{color:var(--color-success);}
      .metric-trend.down{color:var(--color-danger);}

      /* ACTION TILES */
      .action-grid{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
        gap:14px;
      }

      .action-tile{
        background:#fff;
        border-radius:12px;
        padding:22px 16px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:10px;
        cursor:pointer;
        box-shadow:var(--shadow-sm);
        border:2px solid transparent;
        transition:all .18s;
        text-align:center;
        min-height:120px;
      }

      .action-tile:hover{
        border-color:var(--green-400);
        background:var(--green-50);
        transform:translateY(-2px);
        box-shadow:var(--shadow-md);
      }

      .action-tile:active{
        transform:translateY(0) scale(.97);
      }

      .action-tile-icon{
        font-size:38px;
      }

      .action-tile-label{
        font-size:14px;
        font-weight:700;
        color:var(--slate-700);
      }

      .action-tile-sub{
        font-size:12px;
        color:var(--slate-400);
      }

      .action-tile.featured{
        background:linear-gradient(135deg,var(--green-600),var(--green-700));
      }

      .action-tile.featured .action-tile-label,
      .action-tile.featured .action-tile-sub{
        color:#fff;
      }

      /* ACTIVITY */
      .activity-item{
        display:flex;
        gap:12px;
        padding:10px 0;
        border-bottom:1px solid var(--slate-100);
      }

      .activity-item:last-child{
        border-bottom:none;
      }

      .activity-dot{
        width:8px;
        height:8px;
        border-radius:50%;
        margin-top:5px;
        flex-shrink:0;
      }

      .activity-content{
        flex:1;
      }

      .activity-title{
        font-size:13px;
        font-weight:600;
        color:var(--slate-700);
      }

    </style>
  </head>

  <body>

    <div class="se-app">
      <div class="se-main">

        <div class="se-page-content">

          <!-- HEADER -->
          <div class="sec-header">
            <div class="sec-title">Dashboard</div>
            <div class="sec-actions">
              <button class="btn btn-primary">+ New Sale</button>
            </div>
          </div>

          <!-- METRICS -->
          <div class="metric-grid">

            <div class="metric-tile">
              <div class="metric-icon">💰</div>
              <div class="metric-val">₹1,24,000</div>
              <div class="metric-lbl">Today's Sales</div>
              <div class="metric-trend up">+12%</div>
            </div>

            <div class="metric-tile blue">
              <div class="metric-icon">🧾</div>
              <div class="metric-val">320</div>
              <div class="metric-lbl">Invoices</div>
            </div>

            <div class="metric-tile amber">
              <div class="metric-icon">📦</div>
              <div class="metric-val">58</div>
              <div class="metric-lbl">Low Stock</div>
            </div>

            <div class="metric-tile red">
              <div class="metric-icon">⚠️</div>
              <div class="metric-val">₹22,500</div>
              <div class="metric-lbl">Outstanding</div>
            </div>

          </div>

          <!-- ACTIONS -->
          <div class="card card-pad mb-4">
            <div class="sec-header">
              <div class="sec-title">Quick Actions</div>
            </div>

            <div class="action-grid">
              <div class="action-tile featured">
                <div class="action-tile-icon">🛒</div>
                <div class="action-tile-label">New Sale</div>
                <div class="action-tile-sub">POS Billing</div>
              </div>

              <div class="action-tile">
                <div class="action-tile-icon">📦</div>
                <div class="action-tile-label">Add Item</div>
              </div>

              <div class="action-tile">
                <div class="action-tile-icon">🚚</div>
                <div class="action-tile-label">New Purchase</div>
              </div>

              <div class="action-tile">
                <div class="action-tile-icon">📊</div>
                <div class="action-tile-label">Reports</div>
              </div>
            </div>
          </div>

          <!-- ACTIVITY -->
          <div class="card card-pad">
            <div class="sec-header">
              <div class="sec-title">Recent Activity</div>
            </div>

            <div class="activity-item">
              <div class="activity-dot bg-green"></div>
              <div>
                <div class="activity-title">Invoice INV-102 created</div>
                <div class="text-muted">₹2,400 • 2 mins ago</div>
              </div>
            </div>

            <div class="activity-item">
              <div class="activity-dot bg-amber"></div>
              <div>
                <div class="activity-title">Stock low for Coke</div>
                <div class="text-muted">5 items left</div>
              </div>
            </div>

            <div class="activity-item">
              <div class="activity-dot bg-blue"></div>
              <div>
                <div class="activity-title">Payment received</div>
                <div class="text-muted">₹5,000</div>
              </div>
            </div>

          </div>

        </div>

      </div>
    </div>

  </body>
</html>

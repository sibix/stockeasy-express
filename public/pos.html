<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Billing — StockEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/core.css" />
    <link rel="stylesheet" href="/css/pages/pos.css" />
  </head>
  <body>
    <div class="se-shell">

      <div id="sidebar-container"></div>

      <div class="se-main">

        <div id="topbar-container"></div>

        <div class="se-page-content pos-page-content">

          <div class="pos-screen">

            <!-- ══ LEFT: Search + Cart ══════════════════════ -->
            <div class="pos-left">

              <div class="pos-search-wrap">
                <input class="form-input pos-search-input" type="text" id="item-search"
                  placeholder="Search item by name or SKU..."
                  oninput="onSearchInput(this.value)"
                  autocomplete="off" />
                <div class="pos-search-results" id="search-results" style="display:none"></div>
              </div>

              <div class="pos-cart-header">
                <span class="pos-cart-title">Bill Items</span>
                <button class="btn btn-sm btn-outline" onclick="clearCart()" id="clear-cart-btn" style="display:none">Clear all</button>
              </div>

              <div class="pos-cart-body" id="cart-body">
                <div class="pos-cart-empty" id="cart-empty">
                  Search and add items above to start billing
                </div>
              </div>

            </div>
            <!-- end pos-left -->

            <!-- ══ RIGHT: Bill Summary + Payment ════════════ -->
            <div class="pos-right">

              <!-- Customer -->
              <div class="form-group pos-customer">
                <label class="form-label">Customer Name</label>
                <input class="form-input" type="text" id="customer-name"
                  placeholder="Walk-in Customer" />
              </div>

              <!-- Totals -->
              <div class="pos-totals">
                <div class="pos-total-row">
                  <span>Subtotal</span>
                  <span id="bill-subtotal">₹0.00</span>
                </div>
                <div class="pos-total-row">
                  <span>CGST</span>
                  <span id="bill-cgst">₹0.00</span>
                </div>
                <div class="pos-total-row">
                  <span>SGST</span>
                  <span id="bill-sgst">₹0.00</span>
                </div>
                <div class="pos-total-row">
                  <span>Discount</span>
                  <div class="pos-discount-wrap">
                    <span>₹</span>
                    <input type="number" id="discount-input" class="pos-discount-input"
                      min="0" placeholder="0" oninput="updateBillTotals()" />
                  </div>
                </div>
                <div class="pos-divider"></div>
                <div class="pos-total-row pos-net-row">
                  <span>NET TOTAL</span>
                  <span id="bill-net">₹0.00</span>
                </div>
              </div>

              <!-- Payment method -->
              <div class="form-label" style="margin-bottom:var(--space-2)">Payment Method</div>
              <div class="pay-methods">
                <div class="pay-method" data-method="cash" onclick="selectPayment('cash')">
                  <div class="pay-method-icon">💵</div>
                  <div class="pay-method-label">Cash</div>
                </div>
                <div class="pay-method" data-method="card" onclick="selectPayment('card')">
                  <div class="pay-method-icon">💳</div>
                  <div class="pay-method-label">Card</div>
                </div>
                <div class="pay-method" data-method="upi" onclick="selectPayment('upi')">
                  <div class="pay-method-icon">📱</div>
                  <div class="pay-method-label">UPI</div>
                </div>
              </div>

              <!-- Charge button -->
              <button class="btn btn-primary pos-charge-btn" id="charge-btn"
                onclick="saveSale()" disabled>
                Charge ₹0.00
              </button>

              <button class="btn btn-outline pos-new-btn" id="new-bill-btn"
                onclick="newBill()" style="display:none">
                + New Bill
              </button>

            </div>
            <!-- end pos-right -->

          </div>
          <!-- end pos-screen -->

        </div>

      </div>
    </div>

    <div id="toast" class="toast toast-green" style="display:none">
      <span id="toast-icon" style="font-size:var(--text-xl)">✅</span>
      <span id="toast-msg"></span>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/pages/pos.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purchase Entry — StockEasy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/core.css" />
    <link rel="stylesheet" href="/css/pages/categories.css" />
    <style>
      /* ── Purchase specific styles ───────────────────── */

      /* Supplier search */
      #supplier-wrap {
        position: relative;
      }
      .p-drop {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #fff;
        border: 1.5px solid var(--slate-200);
        border-radius: var(--radius-lg);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.09);
        z-index: 400;
        max-height: 240px;
        overflow-y: auto;
      }
      .p-drop-item {
        padding: 10px 14px;
        cursor: pointer;
        border-bottom: 1px solid var(--slate-100);
      }
      .p-drop-item:last-child {
        border-bottom: none;
      }
      .p-drop-item:hover {
        background: var(--slate-50);
      }
      .p-drop-name {
        font-weight: 600;
        font-size: 13px;
        color: var(--slate-800);
      }
      .p-drop-meta {
        font-size: 11px;
        color: var(--slate-400);
        margin-top: 2px;
      }
      .p-drop-add {
        color: var(--color-primary);
        font-weight: 600;
        font-size: 13px;
      }

      /* Supplier badge */
      .supplier-badge {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--slate-50);
        border: 1px solid var(--slate-200);
        border-radius: var(--radius-lg);
        padding: 10px 14px;
        margin-top: 8px;
      }
      .supplier-name {
        font-weight: 700;
        color: var(--slate-800);
      }
      .supplier-meta {
        font-size: 12px;
        color: var(--slate-400);
      }
      .supplier-clear {
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--slate-400);
        font-size: 18px;
        line-height: 1;
        padding: 0 4px;
      }
      .supplier-clear:hover {
        color: var(--red-500);
      }

      /* Line item cards */
      .line-item-card {
        background: #fff;
        border: 1.5px solid var(--slate-200);
        border-radius: var(--radius-lg);
        margin-bottom: 10px;
        overflow: hidden;
      }
      .line-item-card:focus-within {
        border-color: var(--color-primary);
      }
      .line-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: var(--slate-50);
        cursor: pointer;
        user-select: none;
      }
      .line-header:hover {
        background: var(--slate-100);
      }
      .line-num {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--slate-200);
        color: var(--slate-600);
        font-size: 11px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .line-title {
        flex: 1;
        font-size: 13px;
        color: var(--slate-700);
      }
      .line-cat {
        font-weight: 400;
        color: var(--slate-400);
        font-size: 12px;
      }
      .line-summary {
        font-size: 12px;
        color: var(--slate-400);
        white-space: nowrap;
      }
      .line-chev {
        font-size: 10px;
        color: var(--slate-400);
        flex-shrink: 0;
      }
      .line-remove {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--slate-300);
        font-size: 18px;
        line-height: 1;
        padding: 0 4px;
        flex-shrink: 0;
      }
      .line-remove:hover {
        color: var(--red-500, #ef4444);
      }
      .line-section {
        padding: 14px 16px;
        border-top: 1px solid var(--slate-100);
      }

      /* Variant grid */
      .variant-grid-wrap {
        overflow-x: auto;
      }
      .variant-table {
        border-collapse: collapse;
        font-size: 12px;
        width: 100%;
      }
      .variant-table th {
        background: var(--slate-50);
        padding: 6px 10px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--slate-500);
        border-bottom: 1px solid var(--slate-200);
        white-space: nowrap;
        text-align: center;
      }
      .vt-attr {
        text-align: left !important;
        min-width: 60px;
      }
      .vt-col {
        min-width: 72px;
      }
      .vt-attr-val {
        padding: 6px 10px;
        font-weight: 600;
        color: var(--slate-700);
        background: var(--slate-50);
        border-right: 1px solid var(--slate-200);
        white-space: nowrap;
      }
      .vt-cell {
        padding: 4px 6px;
        text-align: center;
      }
      .vt-input {
        width: 64px;
        padding: 4px 6px;
        text-align: center;
        border: 1px solid var(--slate-200);
        border-radius: 6px;
        font-size: 12px;
        font-family: "DM Mono", monospace;
        outline: none;
      }
      .vt-input:focus {
        border-color: var(--color-primary);
      }
      .vt-row-total,
      .vt-col-total,
      .vt-grand-total {
        padding: 6px 10px;
        text-align: center;
        font-weight: 700;
        font-family: "DM Mono", monospace;
        color: var(--slate-600);
        background: var(--slate-50);
        font-size: 12px;
      }
      .vt-grand-total {
        color: var(--color-primary);
      }
      .vt-totals-row td {
        border-top: 1px solid var(--slate-200);
      }

      /* 1D variant list */
      .variant-1d {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .variant-1d-row {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--slate-50);
        border: 1px solid var(--slate-200);
        border-radius: var(--radius-md);
        padding: 6px 10px;
      }
      .variant-1d-label {
        min-width: 30px;
        text-align: center;
      }
      .variant-1d-qty {
        width: 64px !important;
        padding: 4px 6px !important;
        text-align: center;
        font-family: "DM Mono", monospace;
      }
      .variant-1d-unit {
        font-size: 11px;
        color: var(--slate-400);
      }

      /* Empty state */
      .empty-lines {
        text-align: center;
        padding: 40px;
        color: var(--slate-400);
      }

      /* Bill summary */
      .bill-summary {
        background: #fff;
        border: 1.5px solid var(--slate-200);
        border-radius: var(--radius-lg);
        padding: 16px;
        position: sticky;
        top: 16px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--slate-100);
        font-size: 13px;
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .summary-row.total {
        font-weight: 700;
        font-size: 15px;
        color: var(--slate-800);
        padding-top: 10px;
      }
      .summary-label {
        color: var(--slate-500);
      }
      .summary-value {
        font-family: "DM Mono", monospace;
        font-weight: 600;
      }

      /* Layout */
      .purchase-layout {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .purchase-layout {
          grid-template-columns: 1fr;
        }
      }

      /* Quick supplier modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-box {
        background: #fff;
        border-radius: var(--radius-lg);
        padding: 24px;
        width: 400px;
        max-width: 95vw;
      }
      .modal-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 16px;
      }

      /* Fix line items overflow */
      .se-page-content {
        overflow-y: auto;
        overflow-x: hidden;
      }

      .purchase-layout {
        min-height: 0;
      }

      .line-item-card {
        overflow: visible !important;
      }

      /* Fix inner section overflow */
      .line-section {
        overflow: visible;
      }

      /* Variant grid scrolls horizontally */
      .variant-grid-wrap {
        overflow-x: auto;
        overflow-y: visible;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="se-shell">
      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="se-main">
        <!-- TOPBAR -->
        <div id="topbar-container"></div>

        <!-- MODULE TABS -->
        <div class="module-tabs">
          <a href="/purchases.html" class="mtab active">New Purchase</a>
          <a href="/purchase-history.html" class="mtab">History</a>
          <a href="/suppliers.html" class="mtab">Suppliers</a>
        </div>

        <!-- PAGE CONTENT -->
        <div class="se-page-content">
          <div class="page-header">
            <div>
              <div class="page-header-title">New Purchase Entry</div>
              <div class="page-header-sub">
                Record a purchase bill from a supplier. Stock updates
                automatically.
              </div>
            </div>
          </div>

          <div class="purchase-layout">
            <!-- LEFT — Main entry area -->
            <div>
              <!-- Bill Header -->
              <div class="card card-padded mb-4">
                <div class="section-title">Bill Details</div>
                <div class="form-row">
                  <!-- Supplier -->
                  <div class="form-col" style="max-width: 300px">
                    <div class="form-group">
                      <label class="form-label">Supplier *</label>
                      <div id="supplier-wrap" style="position: relative">
                        <input
                          class="form-input"
                          type="text"
                          id="supplier-input"
                          placeholder="Search supplier..."
                          autocomplete="off"
                        />
                        <div
                          class="p-drop"
                          id="supplier-drop"
                          style="display: none"
                        ></div>
                      </div>
                      <div id="supplier-info" style="display: none"></div>
                    </div>
                  </div>

                  <!-- Seller Bill Number -->
                  <div class="form-col" style="max-width: 200px">
                    <div class="form-group">
                      <label class="form-label">Seller Bill No.</label>
                      <input
                        class="form-input"
                        type="text"
                        id="seller-bill-number"
                        placeholder="e.g. INV-2024-001"
                      />
                      <span class="form-hint">Seller's invoice number</span>
                    </div>
                  </div>

                  <!-- Date -->
                  <div class="form-col" style="max-width: 160px">
                    <div class="form-group">
                      <label class="form-label">Date *</label>
                      <input
                        class="form-input"
                        type="date"
                        id="purchase-date"
                      />
                    </div>
                  </div>

                  <!-- Notes -->
                  <div class="form-col">
                    <div class="form-group">
                      <label class="form-label">Notes</label>
                      <input
                        class="form-input"
                        type="text"
                        id="purchase-notes"
                        placeholder="Optional notes..."
                      />
                    </div>
                  </div>
                </div>
              </div>

              <!-- Line Items -->
              <div class="card card-padded mb-4">
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 12px;
                  "
                >
                  <div class="section-title" style="margin: 0">Line Items</div>
                  <div style="display: flex; gap: 8px; align-items: center">
                    <span class="form-hint" id="summary-line-count"
                      >0 lines</span
                    >
                    <button class="btn btn-primary" onclick="addLineItem()">
                      + Add Line Item
                    </button>
                  </div>
                </div>

                <div id="line-items-container"></div>

                <div style="margin-top: 12px">
                  <button
                    class="btn btn-outline"
                    onclick="addLineItem()"
                    style="width: 100%; justify-content: center"
                  >
                    + Add Another Line Item
                  </button>
                </div>
              </div>
            </div>

            <!-- RIGHT — Summary + Save -->
            <div>
              <div class="bill-summary">
                <div class="section-title">Bill Summary</div>

                <div class="summary-row">
                  <span class="summary-label">Total Pieces</span>
                  <span class="summary-value" id="summary-total-pcs"
                    >0 pcs</span
                  >
                </div>
                <div class="summary-row">
                  <span class="summary-label">Sub Total</span>
                  <span class="summary-value" id="summary-total-amt"
                    >₹0.00</span
                  >
                </div>
                <div class="summary-row">
                  <span class="summary-label">CGST</span>
                  <span class="summary-value" id="summary-cgst">₹0.00</span>
                </div>
                <div class="summary-row">
                  <span class="summary-label">SGST</span>
                  <span class="summary-value" id="summary-sgst">₹0.00</span>
                </div>
                <div class="summary-row total">
                  <span>Net Amount</span>
                  <span id="summary-net-amt">₹0.00</span>
                </div>

                <button
                  class="btn btn-primary"
                  id="save-btn"
                  onclick="savePurchase()"
                  style="width: 100%; margin-top: 16px; justify-content: center"
                >
                  Save Bill
                </button>

                <button
                  class="btn btn-outline"
                  onclick="resetForm()"
                  style="width: 100%; margin-top: 8px; justify-content: center"
                >
                  Clear Form
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- end se-page-content -->
      </div>
      <!-- end se-main -->
    </div>
    <!-- end se-shell -->

    <!-- Quick Add Supplier Modal -->
    <div
      id="quick-supplier-modal"
      class="modal-overlay"
      style="display: none"
      onclick="if (event.target === this) closeQuickSupplier();"
    >
      <div class="modal-box">
        <div class="modal-title">Add New Supplier</div>
        <div class="form-group">
          <label class="form-label">Supplier Name *</label>
          <input
            class="form-input"
            type="text"
            id="qs-name"
            placeholder="e.g. Ravi Textiles"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Contact</label>
          <input
            class="form-input"
            type="text"
            id="qs-contact"
            placeholder="Phone / WhatsApp"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input
            class="form-input"
            type="text"
            id="qs-location"
            placeholder="City"
          />
        </div>
        <div class="modal-actions">
          <button class="btn btn-outline" onclick="closeQuickSupplier()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveQuickSupplier()">
            Add Supplier
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast toast-green" style="display: none">
      <span id="toast-icon" style="font-size: var(--text-xl)">✅</span>
      <span id="toast-msg"></span>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/app.js"></script>
    <script src="/js/pages/purchases.js"></script>
  </body>
</html>

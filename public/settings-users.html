<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings Business — StockEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/core.css" />
    <link rel="stylesheet" href="/css/pages/categories.css" />

    <style>.settings-card {
  cursor: pointer;
  transition: all 0.15s ease;
}

.settings-card:hover {
  border-color: var(--color-primary);
  background: var(--primary-50, #eff6ff);
}

.settings-icon {
  font-size: 22px;
  margin-bottom: 8px;
}

.settings-title {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 4px;
}

.settings-desc {
  font-size: 12px;
  color: var(--slate-500);
}</style>
    
    
  </head>
  <body>
    <div class="se-shell">

      <!-- SIDEBAR -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="se-main">

        <!-- TOPBAR -->
        <div id="topbar-container"></div>

        <!-- MODULE TABS -->
        <div class="module-tabs">
          <a href="/items.html"      class="mtab active">Catalogue</a>
          <a href="/categories.html" class="mtab">Categories</a>
          <a href="/pricelists.html" class="mtab">Price Lists</a>
          <a href="/setdefs.html"    class="mtab">Set Definitions</a>
        </div>

        <!-- PAGE CONTENT -->
<div class="se-page-content">

  <div class="page-header">
    <div>
      <div class="page-header-title">Users & Roles</div>
      <div class="page-header-sub">Manage staff access and permissions</div>
    </div>
    <button class="btn btn-primary">+ Add User</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Phone</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Admin</td>
          <td>Owner</td>
          <td>9999999999</td>
          <td><span class="pill bok2">Active</span></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
        <!-- end se-page-content -->

      </div>
      <!-- end se-main -->
    </div>
    <!-- end se-shell -->

   

    <!-- TOAST -->
    <div id="toast" class="toast toast-green" style="display:none">
      <span id="toast-icon" style="font-size:var(--text-xl)">✅</span>
      <span id="toast-msg"></span>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/app.js"></script>
    <script src="/js/components/stock-table.js"></script>
    <script src="/js/components/wizard.js"></script>
    <script src="/js/pages/items.js"></script>
  </body>
</html>

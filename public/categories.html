<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Categories — StockEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/pages/categories.css" />
    <link rel="stylesheet" href="/css/components/detailed-table.css" />
  </head>
  <body>
    <div class="shell">

      <!-- SIDEBAR — loaded by app.js loadComponent() -->
      <div id="sidebar-container"></div>

      <!-- MAIN -->
      <div class="main">

        <!-- TOPBAR — loaded by app.js loadComponent() -->
        <div id="topbar-container"></div>

        <!-- MODULE TABS -->
        <div class="module-tabs visible">
          <a href="/categories.html" class="mtab active">📚 All Categories</a>
          <a href="/add-category.html" class="mtab">➕ Add New Category</a>
        </div>

        <!-- PAGE CONTENT -->
        <div class="page-content">

          <div class="page-header">
            <div>
              <div class="page-header-title">Categories</div>
              <div class="page-header-sub">Manage product categories, GST rules, and variant attributes</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <a href="/add-category.html"><button class="btn btn-primary">+ New Category</button></a>
            </div>
          </div>

          <!-- STATS BAR -->
          <div class="dt-stats" id="cat-stats">
            <div class="dt-qs"><div class="dt-qs-v">—</div><div class="dt-qs-l">Loading…</div></div>
          </div>

          <!-- TOOLBAR -->
          <div class="dt-toolbar" id="cat-toolbar"></div>

          <!-- ACTIVE FILTER CHIPS -->
          <div class="dt-chips-row" id="cat-chips"></div>

          <!-- GROUPED TABLES -->
          <div id="cat-groups">
            <div class="dt-no-results" style="padding:60px">
              <div style="font-size:28px;margin-bottom:8px">⏳</div>
              <div style="font-size:13px;font-weight:700;color:var(--slate600)">Loading categories…</div>
            </div>
          </div>

        </div>
        <!-- end page-content -->

      </div>
      <!-- end main -->
    </div>
    <!-- end shell -->

    <!-- TOAST -->
    <div id="toast" class="toast toast-green" style="display:none">
      <span id="toast-icon" style="font-size:var(--text-xl)">&#x2705;</span>
      <span id="toast-msg"></span>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/app.js"></script>
    <script src="/js/components/detailed-table.js"></script>
    <script src="/js/pages/categories.js"></script>
  </body>
</html>

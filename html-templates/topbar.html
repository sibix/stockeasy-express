<!-- TOPBAR -->
<div class="se-topbar" id="topbar">
  <div>
    <div class="se-topbar-title" id="page-title">Dashboard</div>
    <div class="se-topbar-breadcrumb" id="page-breadcrumb">Today, 15 Mar 2026</div>
  </div>
  <div class="se-topbar-spacer"></div>
  <div
    class="se-topbar-search"
    onclick="showToast('🔍 Search anything — items, bills, parties...')"
  >
    <span>🔍</span><span>Search everything...</span><span style="margin-left:auto;font-size:11px;background:var(--slate200);padding:1px 6px;border-radius:4px;color:var(--slate500)">⌘K</span>
  </div>
  <button class="se-topbar-icon-btn" onclick="showToast('🔔 3 new notifications')">
    🔔<span class="se-notif-dot"></span>
  </button>
  <button class="se-topbar-icon-btn" onclick="showToast('❓ Help & shortcuts')">❓</button>
  <div id="topbar-actions"></div>
</div>
